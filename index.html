<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการตารางเช่าสินค้า</title>
    <!-- เรียกใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- ฟอนต์ภาษาไทย -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-gray-50 p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
            <div class="bg-blue-100 p-3 rounded-xl text-blue-600">
                <i class="ph ph-clock text-3xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold text-gray-800">ระบบจัดการตารางเช่าสินค้า</h1>
                <p class="text-gray-500 text-sm">จัดการลูกค้า เวลาเช่า และสถานะการคืนสินค้า</p>
            </div>
        </div>

        <!-- Add Form Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h2 class="text-lg font-semibold mb-4 text-gray-800 flex items-center gap-2">
                <i class="ph ph-plus-circle text-blue-500 text-xl"></i>
                เพิ่มข้อมูลการเช่าใหม่
            </h2>
            <form id="rentalForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="md:col-span-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อลูกค้า</label>
                    <input type="text" id="customerName" required placeholder="กรอกชื่อลูกค้า..."
                        class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" />
                </div>
                <div class="md:col-span-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">วัน-เวลาที่เริ่มเช่า</label>
                    <input type="datetime-local" id="startTime" required
                        class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" />
                </div>
                <div class="md:col-span-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">วัน-เวลาที่สิ้นสุด</label>
                    <input type="datetime-local" id="endTime" required
                        class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" />
                </div>
                <div class="md:col-span-1 flex items-end">
                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-lg transition shadow-sm">
                        เพิ่มรายการ
                    </button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="p-4 font-semibold text-gray-600 whitespace-nowrap">ชื่อลูกค้า</th>
                            <th class="p-4 font-semibold text-gray-600 whitespace-nowrap">เริ่มเช่า</th>
                            <th class="p-4 font-semibold text-gray-600 whitespace-nowrap">สิ้นสุดการเช่า</th>
                            <th class="p-4 font-semibold text-gray-600 whitespace-nowrap">สถานะ</th>
                            <th class="p-4 font-semibold text-gray-600 whitespace-nowrap text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-100">
                        <!-- ข้อมูลจะถูกสร้างผ่าน JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. ตั้งค่า Firebase
        // (หากเอาไปใช้งานจริงนอกระบบนี้ ให้เปลี่ยน YOUR_API_KEY เป็นของโปรเจกต์คุณเองนะครับ)
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyC-83fbGhA9KmPl3XKQ0Osq9B-b20ZYZmM",
            authDomain: "komibot-eef25.firebaseapp.com",
            projectId: "komibot-eef25",
            storageBucket: "komibot-eef25.firebasestorage.app",
            messagingSenderId: "368826795096",
            appId: "1:368826795096:web:d6c7bca022d03526adf62d"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-rental-app';

        let rentals = [];
        let userId = null;
        let unsubscribe = null;

        // 2. ระบบยืนยันตัวตน
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                setupRealtimeListener();
            } else {
                userId = null;
                if (unsubscribe) unsubscribe();
            }
        });

        // 3. ดึงข้อมูลแบบ Real-time
        function setupRealtimeListener() {
            if (!userId) return;
            document.getElementById('tableBody').innerHTML = `<tr><td colSpan="5" class="p-8 text-center text-gray-500">กำลังโหลดข้อมูล...</td></tr>`;
            
            const rentalsRef = collection(db, 'artifacts', appId, 'users', userId, 'rentals');
            unsubscribe = onSnapshot(rentalsRef, (snapshot) => {
                rentals = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // เรียงข้อมูลจากใหม่ไปเก่า
                rentals.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                renderTable();
            }, (error) => {
                console.error("Firestore error:", error);
            });
        }

        // ฟังก์ชันจัดรูปแบบวันที่และเวลา
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('th-TH', { 
                year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });
        }

        // ทำให้ปุ่มใน HTML สามารถเรียกใช้ฟังก์ชันได้
        window.toggleStatus = async function(id) {
            if (!userId) return;
            const rental = rentals.find(r => r.id === id);
            if (!rental) return;
            
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'rentals', id);
                await updateDoc(docRef, { isReturned: !rental.isReturned });
            } catch (error) {
                console.error("Error updating:", error);
            }
        };

        window.deleteRental = async function(id) {
            if (!userId) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', userId, 'rentals', id);
                await deleteDoc(docRef);
            } catch (error) {
                console.error("Error deleting:", error);
            }
        };

        // แสดงผลตาราง
        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const currentTime = new Date();

            if (rentals.length === 0) {
                tableBody.innerHTML = `<tr><td colSpan="5" class="p-8 text-center text-gray-400">ยังไม่มีข้อมูลการเช่า</td></tr>`;
                return;
            }

            tableBody.innerHTML = rentals.map(rental => {
                const isExpired = new Date(rental.endTime) < currentTime;
                const needsAction = isExpired && !rental.isReturned;
                
                const rowClassName = needsAction 
                    ? 'bg-red-50 hover:bg-red-100 transition-colors' 
                    : rental.isReturned 
                        ? 'bg-gray-50 opacity-80 hover:bg-gray-100 transition-colors' 
                        : 'bg-white hover:bg-gray-50 transition-colors';

                let statusHtml = '';
                if (rental.isReturned) {
                    statusHtml = `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-700 border border-green-200"><i class="ph ph-check-circle"></i> คืนสินค้าแล้ว</span>`;
                } else if (needsAction) {
                    statusHtml = `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-red-100 text-red-700 border border-red-200 animate-pulse"><i class="ph ph-warning-circle"></i> หมดเวลาเช่า</span>`;
                } else {
                    statusHtml = `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-700 border border-blue-200"><i class="ph ph-clock"></i> กำลังเช่าอยู่</span>`;
                }

                const btnClass = rental.isReturned 
                    ? 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                    : 'bg-green-500 text-white hover:bg-green-600 shadow-sm';
                const btnText = rental.isReturned ? 'ยกเลิกการคืน' : 'รับคืนสินค้า';
                const timeColorClass = needsAction ? 'text-red-600' : 'text-gray-600';

                return `
                    <tr class="${rowClassName}">
                        <td class="p-4 font-medium text-gray-800 whitespace-nowrap">${rental.customerName}</td>
                        <td class="p-4 text-sm text-gray-600 whitespace-nowrap">${formatDateTime(rental.startTime)}</td>
                        <td class="p-4 text-sm font-medium ${timeColorClass} whitespace-nowrap">${formatDateTime(rental.endTime)}</td>
                        <td class="p-4 whitespace-nowrap">${statusHtml}</td>
                        <td class="p-4">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="toggleStatus('${rental.id}')" class="whitespace-nowrap px-3 py-1.5 rounded-lg text-sm font-medium transition-colors ${btnClass}">
                                    ${btnText}
                                </button>
                                <button onclick="deleteRental('${rental.id}')" class="p-1.5 text-red-500 hover:bg-red-100 rounded-lg transition-colors" title="ลบข้อมูล">
                                    <i class="ph ph-trash text-lg"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // กดปุ่มบันทึกข้อมูล
        document.getElementById('rentalForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!userId) return;
            
            const customerName = document.getElementById('customerName').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            if (new Date(endTime) <= new Date(startTime)) {
                // เปลี่ยนสีปุ่มแจ้งเตือนว่าเวลาผิดพลาด
                const btn = this.querySelector('button[type="submit"]');
                const oldText = btn.innerHTML;
                btn.innerHTML = 'เวลาสิ้นสุดต้องมากกว่าเวลาเริ่ม!';
                btn.classList.replace('bg-blue-600', 'bg-red-500');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');
                setTimeout(() => {
                    btn.innerHTML = oldText;
                    btn.classList.replace('bg-red-500', 'bg-blue-600');
                    btn.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
                }, 3000);
                return;
            }

            const newRental = {
                customerName,
                startTime,
                endTime,
                isReturned: false,
                createdAt: new Date().toISOString()
            };

            try {
                const rentalsRef = collection(db, 'artifacts', appId, 'users', userId, 'rentals');
                await addDoc(rentalsRef, newRental);
                this.reset();
            } catch (error) {
                console.error("Error adding document: ", error);
            }
        });

        // รีเฟรชดูเวลาเรียลไทม์ทุก 1 วินาที
        setInterval(() => {
            if (rentals.length > 0) renderTable();
        }, 1000);
    </script>
</body>
</html>
