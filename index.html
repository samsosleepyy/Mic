<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการตารางเช่าสินค้า</title>
    <!-- เรียกใช้ Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- เรียกใช้ Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- ฟอนต์ภาษาไทย -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #0f172a; color: #f8fafc; }
        /* รองรับ Dark mode สำหรับ input datetime */
        :root { color-scheme: dark; }
        /* เอฟเฟกต์เงาสะท้อนกระจก */
        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body class="min-h-screen bg-[#0b0f19] p-4 md:p-8 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')] relative overflow-x-hidden">

    <!-- แสงนีออนพื้นหลัง -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-purple-600/20 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-cyan-600/20 blur-[120px] pointer-events-none"></div>

    <div class="max-w-6xl mx-auto space-y-8 relative z-10">
        
        <!-- Header -->
        <div class="glass-panel p-6 rounded-2xl flex items-center gap-5">
            <div class="bg-gray-800/80 p-3.5 rounded-xl text-cyan-400 border border-cyan-500/30 shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                <i class="ph-duotone ph-clock text-4xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold text-white tracking-wide drop-shadow-[0_0_8px_rgba(255,255,255,0.3)]">ระบบจัดการตารางเช่าสินค้า</h1>
                <p class="text-cyan-200/70 text-sm mt-1 font-medium">จัดการลูกค้า เวลาเช่า และสถานะการคืนสินค้า</p>
            </div>
        </div>

        <!-- Add Form Section -->
        <div class="glass-panel p-6 rounded-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-pink-500 rounded-full mix-blend-screen filter blur-[80px] opacity-10 pointer-events-none"></div>
            
            <h2 class="text-xl font-semibold mb-5 text-gray-100 flex items-center gap-2">
                <i class="ph-fill ph-plus-circle text-purple-400 text-2xl drop-shadow-[0_0_10px_rgba(192,132,252,0.6)]"></i>
                เพิ่มข้อมูลการเช่าใหม่
            </h2>
            <form id="rentalForm" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-5">
                <div class="md:col-span-1 lg:col-span-1">
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">ชื่อลูกค้า</label>
                    <input type="text" id="customerName" required placeholder="กรอกชื่อลูกค้า..."
                        class="w-full p-3 bg-gray-900/80 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition shadow-inner" />
                </div>
                <div class="md:col-span-1 lg:col-span-1">
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">อีเมลลูกค้า (ถ้ามี)</label>
                    <input type="email" id="customerEmail" placeholder="กรอกอีเมล..."
                        class="w-full p-3 bg-gray-900/80 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition shadow-inner" />
                </div>
                <div class="md:col-span-1 lg:col-span-1">
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">วัน-เวลาที่เริ่มเช่า</label>
                    <input type="datetime-local" id="startTime" required
                        class="w-full p-3 bg-gray-900/80 border border-gray-700 rounded-xl text-white focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition shadow-inner" />
                </div>
                <div class="md:col-span-1 lg:col-span-1">
                    <label class="block text-sm font-medium text-gray-300 mb-1.5">วัน-เวลาที่สิ้นสุด</label>
                    <input type="datetime-local" id="endTime" required
                        class="w-full p-3 bg-gray-900/80 border border-gray-700 rounded-xl text-white focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition shadow-inner" />
                </div>
                <div class="md:col-span-1 lg:col-span-1 flex items-end">
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-[0_0_20px_rgba(147,51,234,0.4)] hover:shadow-[0_0_25px_rgba(147,51,234,0.6)] transform hover:-translate-y-0.5 border border-purple-400/30">
                        เพิ่มรายการ
                    </button>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        <div class="glass-panel rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-800/50 border-b border-gray-700">
                            <th class="p-4 font-semibold text-gray-300 whitespace-nowrap">ชื่อลูกค้า</th>
                            <th class="p-4 font-semibold text-gray-300 whitespace-nowrap">อีเมล</th>
                            <th class="p-4 font-semibold text-gray-300 whitespace-nowrap">เริ่มเช่า</th>
                            <th class="p-4 font-semibold text-gray-300 whitespace-nowrap">สิ้นสุดการเช่า</th>
                            <th class="p-4 font-semibold text-gray-300 whitespace-nowrap">สถานะ</th>
                            <th class="p-4 font-semibold text-gray-300 whitespace-nowrap text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-700/50">
                        <!-- ข้อมูลจะถูกสร้างผ่าน JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        // เปลี่ยนมาใช้ Realtime Database แทน Firestore
        import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // 1. ตั้งค่า Firebase
        // (หากเอาไปใช้งานจริงนอกระบบนี้ ให้เปลี่ยน YOUR_API_KEY เป็นของโปรเจกต์คุณเองนะครับ)
{
            apiKey: "AIzaSyC-83fbGhA9KmPl3XKQ0Osq9B-b20ZYZmM",
            authDomain: "komibot-eef25.firebaseapp.com",
            projectId: "komibot-eef25",
            storageBucket: "komibot-eef25.firebasestorage.app",
            messagingSenderId: "368826795096",
            appId: "1:368826795096:web:d6c7bca022d03526adf62d"
        };        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app); // ใช้ getDatabase แทน getFirestore
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'my-rental-app';

        let rentals = [];
        let userId = null;
        let unsubscribe = null;

        // --- ตั้งค่า Discord Webhook ---
        const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1501513760806801518/hk9hUcCJuqikyUDDqOooj-UkozZywj2QtOEmQ86pX-mZ8UDMcxchnTee_FFWDlpylETT";

        async function sendDiscordWebhook(rental, action) {
            let mention = rental.customerName;
            // ตรวจสอบว่าเป็นไอดี Discord (ตัวเลขล้วน) หรือไม่ ถ้าใช่ให้แปลงเป็น <@id> เพื่อ Ping
            if (/^\d+$/.test(mention)) {
                mention = `<@${mention}>`;
            } else if (!mention.startsWith('<@')) {
                mention = `@${mention}`; // ถ้าเป็นชื่อธรรมดา
            }

            const emailText = rental.customerEmail ? rental.customerEmail : "-";

            let message = "";
            if (action === 'start') {
                message = `🟢 **[เริ่มเช่าสินค้า]**\n👤 ลูกค้า: ${mention}\n📧 อีเมล: ${emailText}\n🕒 เริ่ม: ${formatDateTime(rental.startTime)}\n⏳ สิ้นสุด: ${formatDateTime(rental.endTime)}`;
            } else if (action === 'return') {
                message = `⚪ **[คืนสินค้า / ยกเลิกเช่า]**\n👤 ลูกค้า: ${mention}\n📧 อีเมล: ${emailText}\n✅ คืนสินค้าเรียบร้อยแล้ว`;
            } else if (action === 'expire') {
                // เพิ่มการแท็ก Admin เข้าไปในข้อความแจ้งเตือนหมดเวลา
                message = `🔴 **[หมดเวลาเช่าแล้ว!]**\n👤 ลูกค้า: ${mention}\n📧 อีเมล: ${emailText}\n⚠️ กรุณาตรวจสอบและทวงถามการคืนสินค้า\n👮 แจ้งเตือนแอดมิน: <@904046392106967122>`;
            }

            try {
                await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: message })
                });
            } catch (error) {
                console.error("Webhook Error:", error);
            }
        }

        // 2. ระบบยืนยันตัวตน
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
            }
        };
        initAuth();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                userId = user.uid;
                setupRealtimeListener();
            } else {
                userId = null;
                if (unsubscribe) {
                    unsubscribe();
                    unsubscribe = null;
                }
            }
        });

        // 3. ดึงข้อมูลแบบ Real-time จาก Realtime Database
        function setupRealtimeListener() {
            if (!userId) return;
            document.getElementById('tableBody').innerHTML = `<tr><td colSpan="6" class="p-8 text-center text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.5)]">กำลังโหลดข้อมูล...</td></tr>`;
            
            const rentalsRef = ref(db, `artifacts/${appId}/users/${userId}/rentals`);
            
            // ใช้ onValue ของ Realtime Database ในการจับตาดูการเปลี่ยนแปลง
            unsubscribe = onValue(rentalsRef, (snapshot) => {
                const data = snapshot.val();
                rentals = [];
                if (data) {
                    // แปลงข้อมูล Object จาก Firebase ให้เป็น Array
                    for (const key in data) {
                        rentals.push({ id: key, ...data[key] });
                    }
                }
                // เรียงข้อมูลจากใหม่ไปเก่า
                rentals.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                renderTable();
            }, (error) => {
                console.error("Database error:", error);
            });
        }

        // ฟังก์ชันจัดรูปแบบวันที่และเวลา
        function formatDateTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('th-TH', { 
                year: 'numeric', month: 'short', day: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });
        }

        // ทำให้ปุ่มใน HTML สามารถเรียกใช้ฟังก์ชันได้
        window.toggleStatus = async function(id) {
            if (!userId) return;
            const rental = rentals.find(r => r.id === id);
            if (!rental) return;
            
            try {
                // อัปเดตข้อมูลด้วยคำสั่ง update()
                const rentalRef = ref(db, `artifacts/${appId}/users/${userId}/rentals/${id}`);
                const isNowReturned = !rental.isReturned;
                await update(rentalRef, { isReturned: isNowReturned });

                // ส่ง Webhook แจ้งเตือนเมื่อมีการกดคืนสินค้า (เปลี่ยนจากยังไม่คืน -> คืนแล้ว)
                if (isNowReturned) {
                    sendDiscordWebhook(rental, 'return');
                }
            } catch (error) {
                console.error("Error updating:", error);
            }
        };

        window.deleteRental = async function(id) {
            if (!userId) return;
            try {
                // ลบข้อมูลด้วยคำสั่ง remove()
                const rentalRef = ref(db, `artifacts/${appId}/users/${userId}/rentals/${id}`);
                await remove(rentalRef);
            } catch (error) {
                console.error("Error deleting:", error);
            }
        };

        // แสดงผลตาราง
        function renderTable() {
            const tableBody = document.getElementById('tableBody');
            const currentTime = new Date();

            if (rentals.length === 0) {
                tableBody.innerHTML = `<tr><td colSpan="6" class="p-8 text-center text-gray-500">ยังไม่มีข้อมูลการเช่า</td></tr>`;
                return;
            }

            tableBody.innerHTML = rentals.map(rental => {
                const isExpired = new Date(rental.endTime) < currentTime;
                const needsAction = isExpired && !rental.isReturned;
                
                const rowClassName = needsAction 
                    ? 'bg-rose-900/20 hover:bg-rose-900/30 transition-colors' 
                    : rental.isReturned 
                        ? 'bg-gray-900/40 opacity-60 hover:bg-gray-900/60 transition-colors' 
                        : 'bg-transparent hover:bg-gray-800/40 transition-colors';

                let statusHtml = '';
                if (rental.isReturned) {
                    statusHtml = `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 shadow-[0_0_10px_rgba(16,185,129,0.2)]"><i class="ph-fill ph-check-circle"></i> คืนสินค้าแล้ว</span>`;
                } else if (needsAction) {
                    statusHtml = `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-rose-500/10 text-rose-400 border border-rose-500/50 shadow-[0_0_15px_rgba(244,63,94,0.4)] animate-pulse"><i class="ph-fill ph-warning-circle"></i> หมดเวลาเช่า</span>`;
                } else {
                    statusHtml = `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 shadow-[0_0_10px_rgba(6,182,212,0.2)]"><i class="ph-fill ph-clock"></i> กำลังเช่าอยู่</span>`;
                }

                const btnClass = rental.isReturned 
                    ? 'bg-gray-800 text-gray-400 hover:bg-gray-700 border border-gray-600 shadow-inner'
                    : 'bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30 border border-emerald-500/50 shadow-[0_0_10px_rgba(16,185,129,0.2)] hover:shadow-[0_0_15px_rgba(16,185,129,0.4)]';
                const btnText = rental.isReturned ? 'ยกเลิกการคืน' : 'รับคืนสินค้า';
                const timeColorClass = needsAction ? 'text-rose-400 drop-shadow-[0_0_5px_rgba(244,63,94,0.5)] font-semibold' : 'text-gray-300';
                const nameColorClass = rental.isReturned ? 'text-gray-500' : 'text-gray-100 font-medium';
                const emailText = rental.customerEmail ? rental.customerEmail : '<span class="text-gray-600">-</span>';

                return `
                    <tr class="${rowClassName}">
                        <td class="p-4 ${nameColorClass} whitespace-nowrap">${rental.customerName}</td>
                        <td class="p-4 text-sm text-gray-400 whitespace-nowrap">${emailText}</td>
                        <td class="p-4 text-sm text-gray-400 whitespace-nowrap">${formatDateTime(rental.startTime)}</td>
                        <td class="p-4 text-sm ${timeColorClass} whitespace-nowrap">${formatDateTime(rental.endTime)}</td>
                        <td class="p-4 whitespace-nowrap">${statusHtml}</td>
                        <td class="p-4">
                            <div class="flex items-center justify-center gap-3">
                                <button onclick="toggleStatus('${rental.id}')" class="whitespace-nowrap px-4 py-1.5 rounded-lg text-sm font-bold transition-all ${btnClass}">
                                    ${btnText}
                                </button>
                                <button onclick="deleteRental('${rental.id}')" class="p-2 text-rose-500 hover:bg-rose-500/20 rounded-lg transition-all drop-shadow-[0_0_5px_rgba(244,63,94,0.3)] hover:drop-shadow-[0_0_8px_rgba(244,63,94,0.6)]" title="ลบข้อมูล">
                                    <i class="ph-fill ph-trash text-xl"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // กดปุ่มบันทึกข้อมูล
        document.getElementById('rentalForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!userId) return;
            
            const customerName = document.getElementById('customerName').value;
            const customerEmail = document.getElementById('customerEmail').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            if (new Date(endTime) <= new Date(startTime)) {
                // เปลี่ยนสีปุ่มแจ้งเตือนว่าเวลาผิดพลาด
                const btn = this.querySelector('button[type="submit"]');
                const oldText = btn.innerHTML;
                btn.innerHTML = 'เวลาสิ้นสุดต้องมากกว่าเวลาเริ่ม!';
                btn.className = 'w-full bg-rose-600 hover:bg-rose-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-[0_0_20px_rgba(244,63,94,0.6)] border border-rose-400';
                setTimeout(() => {
                    btn.innerHTML = oldText;
                    btn.className = 'w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-[0_0_20px_rgba(147,51,234,0.4)] hover:shadow-[0_0_25px_rgba(147,51,234,0.6)] transform hover:-translate-y-0.5 border border-purple-400/30';
                }, 3000);
                return;
            }

            const newRental = {
                customerName,
                customerEmail,
                startTime,
                endTime,
                isReturned: false,
                notificationSent: false, // เพิ่มสถานะป้องกันการส่ง Webhook แจ้งหมดเวลาซ้ำ
                createdAt: new Date().toISOString()
            };

            try {
                // เพิ่มข้อมูลใหม่ด้วย push() และ set()
                const rentalsRef = ref(db, `artifacts/${appId}/users/${userId}/rentals`);
                const newRentalRef = push(rentalsRef);
                await set(newRentalRef, newRental);
                
                // แจ้งเตือนการเริ่มเช่าสินค้า
                sendDiscordWebhook(newRental, 'start');
                
                this.reset();
            } catch (error) {
                console.error("Error adding document: ", error);
            }
        });

        // ฟังก์ชันตรวจสอบการหมดเวลาเช่า เพื่อส่ง Webhook
        async function checkExpirations() {
            if (!userId) return;
            const currentTime = new Date();
            
            for (const rental of rentals) {
                const isExpired = new Date(rental.endTime) < currentTime;
                
                // ถ้าหมดเวลา + ยังไม่คืน + และยังไม่เคยส่งแจ้งเตือน
                if (isExpired && !rental.isReturned && !rental.notificationSent) {
                    rental.notificationSent = true; // อัปเดตในเครื่องก่อนเพื่อป้องกันลูปส่งซ้ำ
                    
                    // ส่ง Webhook แจ้งเตือน
                    sendDiscordWebhook(rental, 'expire');
                    
                    try {
                        // บันทึกลงฐานข้อมูลว่าออเดอร์นี้ส่งแจ้งเตือนหมดเวลาไปแล้ว
                        const rentalRef = ref(db, `artifacts/${appId}/users/${userId}/rentals/${rental.id}`);
                        await update(rentalRef, { notificationSent: true });
                    } catch (error) {
                        console.error("Error updating notification status:", error);
                    }
                }
            }
        }

        // รีเฟรชดูเวลาเรียลไทม์ทุก 1 วินาที
        setInterval(() => {
            if (rentals.length > 0) {
                checkExpirations(); // เพิ่มระบบตรวจเช็คแจ้งเตือน
                renderTable();
            }
        }, 1000);
    </script>
</body>
</html>
